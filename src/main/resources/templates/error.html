<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Googol Search Results</title>
    <link rel="stylesheet" href="css/home.css" />
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <a href="/" class="home-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="home-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
    </div>

    <!-- Header -->
    <div class="container">
        <div class="logo-container">
            <img src="/images/star.png" alt="Star Background" class="star-image" />
            <a href="/" class="logo-link">
                <img src="/images/logo.png" alt="Googol Logo" class="logo" />
            </a>
        </div>
        <p class="error-message" id="errorMsg">
            An error occurred 😞
            <br />
            Click the logo or the home icon to go back to the main page!
          </p>
        
    </div>

    <script>
            window.addEventListener("DOMContentLoaded", () => {
    const errorMsg = document.getElementById("errorMsg");
    setTimeout(() => {
        errorMsg.classList.add("show");
    }, 100); // short delay to trigger transition
    });
    </script>
    
</body>
</html>
